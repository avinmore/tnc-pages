<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rutuma – Period & Ovulation Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; }
    header { background: linear-gradient(135deg, #D97A8F 0%, #B8A4E0 100%); padding: 60px 24px; text-align: center; color: #fff; }
    header h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 8px; }
    header p { font-size: 1.1rem; opacity: 0.9; }
    .container { max-width: 700px; margin: 0 auto; padding: 48px 24px; }
    .cards { display: flex; flex-direction: column; gap: 16px; }
    .card { border: 1.5px solid #e8e8e8; border-radius: 14px; padding: 24px 28px; text-decoration: none; color: #1a1a1a; display: flex; align-items: center; justify-content: space-between; transition: box-shadow 0.2s, border-color 0.2s; }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-color: #D97A8F; }
    .card-text h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
    .card-text p { font-size: 0.875rem; color: #666; }
    .card-arrow { font-size: 1.2rem; color: #D97A8F; }
    footer { text-align: center; padding: 32px 24px; font-size: 0.8rem; color: #999; border-top: 1px solid #f0f0f0; }
    footer a { color: #D97A8F; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>Rutuma</h1>
    <p>Period & Ovulation Tracker</p>
  </header>
  <div class="container">
    <div class="cards">
      <a class="card" href="privacy-policy.html">
        <div class="card-text">
          <h2>Privacy Policy</h2>
          <p>How we handle and protect your data</p>
        </div>
        <span class="card-arrow">→</span>
      </a>
      <a class="card" href="terms-of-use.html">
        <div class="card-text">
          <h2>Terms of Use</h2>
          <p>Rules and conditions for using the app</p>
        </div>
        <span class="card-arrow">→</span>
      </a>
      <a class="card" href="medical-disclaimer.html">
        <div class="card-text">
          <h2>Medical Disclaimer</h2>
          <p>Important information about health predictions</p>
        </div>
        <span class="card-arrow">→</span>
      </a>
    </div>
  </div>
  <footer>
    &copy; 2026 Rutuma. Contact: <a href="mailto:support@rutuma.com">support@rutuma.com</a>
  </footer>
</body>
</html>
